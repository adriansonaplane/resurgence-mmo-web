# Template only. Do not put secret values in this file.
# Create each secret separately per environment and bind Cloud Run services to the names below.
apiVersion: blueprint/v1
kind: SecretBindings
metadata:
  environment: ENVIRONMENT_NAME
bindings:
  website-api:
    - DATABASE_URL
    - AUTH0_DOMAIN
    - AUTH0_AUDIENCE
    - AUTH0_CLIENT_ID
    - AUTH0_CLIENT_SECRET
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - EMAIL_PROVIDER
    - EMAIL_API_KEY
    - SENTRY_DSN
    - OTEL_EXPORTER_OTLP_ENDPOINT
    - GAME_BACKEND_SERVICE_TOKEN
  website-frontend:
    - SENTRY_DSN
    - OTEL_EXPORTER_OTLP_ENDPOINT
  website-cms:
    - DIRECTUS_SECRET
    - DIRECTUS_ADMIN_EMAIL
    - DIRECTUS_ADMIN_PASSWORD
    - DATABASE_URL
    - GCS_DIRECTUS_UPLOADS_BUCKET
  website-worker:
    - DATABASE_URL
    - EMAIL_PROVIDER
    - EMAIL_API_KEY
    - SENTRY_DSN
    - OTEL_EXPORTER_OTLP_ENDPOINT
