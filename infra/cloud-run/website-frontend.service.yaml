apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: website-frontend
  labels:
    app.kubernetes.io/name: website-frontend
    app.kubernetes.io/part-of: mmo-website-platform
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: website-frontend-runtime@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/website/frontend:IMAGE_TAG
          ports:
            - containerPort: 4200
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4200"
            - name: APP_PUBLIC_URL
              value: https://APP_DOMAIN
            - name: API_PUBLIC_URL
              value: https://API_DOMAIN
            - name: CMS_PUBLIC_URL
              value: https://CMS_DOMAIN
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: SENTRY_DSN
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
