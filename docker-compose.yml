services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 4200
      API_PUBLIC_URL: http://localhost:8080
      CMS_PUBLIC_URL: http://localhost:8055
      NG_ALLOWED_HOSTS: localhost,127.0.0.1,frontend
    ports:
      - "4200:4200"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
      - cms

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 8080
      APP_PUBLIC_URL: http://localhost:4200
      API_PUBLIC_URL: http://localhost:8080
      CMS_PUBLIC_URL: http://cms:8055
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mmo_website
      DIRECT_DATABASE_URL: postgres://postgres:postgres@postgres:5432/mmo_website
      AUTH0_DOMAIN: example-dev.us.auth0.com
      AUTH0_AUDIENCE: https://api.local
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_SUCCESS_URL: http://localhost:4200/store/success
      STRIPE_CANCEL_URL: http://localhost:4200/store/cancel
      GAME_BACKEND_SERVICE_TOKEN: local-game-service-token
    ports:
      - "8080:8080"
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      - postgres

  cms:
    image: directus/directus:latest
    environment:
      KEY: local-dev-key
      SECRET: local-dev-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: password
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: mmo_website
      DB_USER: postgres
      DB_PASSWORD: postgres
      PUBLIC_URL: http://localhost:8055
      STORAGE_LOCATIONS: gcs
      STORAGE_GCS_DRIVER: gcs
      STORAGE_GCS_BUCKET: local-directus-uploads
    ports:
      - "8055:8055"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mmo_website
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  stripe-cli:
    image: stripe/stripe-cli:latest
    command: listen --forward-to api:8080/api/v1/webhooks/stripe
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
    depends_on:
      - api

volumes:
  postgres_data:
  api_node_modules:
  frontend_node_modules:
