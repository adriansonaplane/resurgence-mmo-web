services:
  frontend:
    build:
      context: ./apps/frontend
    environment:
      NODE_ENV: development
      PORT: 4200
      API_PUBLIC_URL: http://localhost:8080
      CMS_PUBLIC_URL: http://localhost:8055
    ports:
      - "4200:4200"
    depends_on:
      - api
      - cms

  api:
    build:
      context: ./apps/api
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mmo_website
      DIRECT_DATABASE_URL: postgres://postgres:postgres@postgres:5432/mmo_website
      AUTH0_DOMAIN: example-dev.us.auth0.com
      AUTH0_AUDIENCE: https://api.local
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  cms:
    image: directus/directus:latest
    environment:
      KEY: local-dev-key
      SECRET: local-dev-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: password
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: mmo_website
      DB_USER: postgres
      DB_PASSWORD: postgres
      PUBLIC_URL: http://localhost:8055
    ports:
      - "8055:8055"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mmo_website
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:

# Companion boundary notes:
# - This compose file models the web platform independently from the game runtime.
# - Keep game-runtime services out unless intentionally creating a full-stack integration profile.
# - Allowed web services: Angular frontend, NestJS/Fastify API, Directus, website PostgreSQL, test database, optional Redis, optional Mailpit.
